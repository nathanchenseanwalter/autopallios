name: docs

# Build the mkdocs textbook on every push/PR (validates it), and publish it to
# GitHub Pages on pushes to main. Requires: repo Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token; the deploy job needs pages + id-token to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: docs
          cache: true
      - name: Build docs (strict — fails on broken links / bad code references)
        run: pixi run -e docs docs-build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Only publish from main; PRs just build above to validate.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
