name: ci

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: dev
          cache: true
      - name: Lint
        run: pixi run -e dev lint
      - name: Test (mock data only — no GPU, no torch, no real files)
        run: pixi run -e dev test
