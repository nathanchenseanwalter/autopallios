site_name: autopallios
site_description: Automated cell segmentation, tracking & analysis — the OPALS @ UC San Diego textbook.
site_url: https://nathanchenseanwalter.github.io/autopallios/
repo_url: https://github.com/nathanchenseanwalter/autopallios
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - toc.integrate
  palette:
    - scheme: default
      primary: teal
      accent: teal

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            heading_level: 3
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - "Chapter 0 · Setup": chapter0_setup.md
  - "Week 1 · Foundations & first look":
      - Overview: week1_foundations/index.md
  - "Week 2 · Annotate → traditional CV → evaluate":
      - Overview: week2_annotate_cv_eval/index.md
      - Annotate 5 images: week2_annotate_cv_eval/annotation.md
      - The classic-CV baseline: week2_annotate_cv_eval/classic_cv_baseline.md
      - "Implement the metrics (IoU, precision/recall/F1)": week2_annotate_cv_eval/implement_the_metrics.md
  - "Week 3 · The algorithm → the supercomputer":
      - Overview: week3_algorithm_hpc/index.md
      - "Tracking (advanced / optional)": week3_algorithm_hpc/tracking_advanced.md
  - "Week 4 · Finish & present":
      - Overview: week4_finish_present/index.md
  - "From notebook to library": from_notebook_to_library.md
  - "API Reference":
      - Core engine: reference/core.md
      - Analytical modules: reference/modules.md
  - "For Mentors": for_mentors.md
  - "Mentor Runbook": mentor_runbook.md
  - "Role Guides":
      - Data Lead: roles/data_lead.md
      - Model Lead: roles/model_lead.md
      - HPC / Infra Lead: roles/hpc_lead.md
      - Viz / Comms Lead: roles/viz_comms_lead.md
